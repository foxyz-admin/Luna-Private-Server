<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Private Server - Cadastro</title>
    <style>
        body {
            background-color: #000;
            color: #FFCC00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #111;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #FFCC00;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            width: 350px;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #FFCC00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #FFCC00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #e6b800;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Luna Private</h1>
        <p>Crie sua conta VIP 2018</p>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Usuário" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Criar Conta</button>
        </form>
        <div id="message" style="margin-top: 20px;"></div>
        <div class="footer">
            &copy; 2026 Luna Private Server
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            messageDiv.innerText = 'Processando...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    messageDiv.style.color = '#00FF00';
                    messageDiv.innerText = 'Conta criada com sucesso! Já pode logar no jogo.';
                } else {
                    messageDiv.style.color = '#FF0000';
                    messageDiv.innerText = 'Erro: ' + data.error;
                }
            } catch (err) {
                messageDiv.style.color = '#FF0000';
                messageDiv.innerText = 'Erro de conexão com o servidor.';
            }
        });
    </script>
</body>
</html>
