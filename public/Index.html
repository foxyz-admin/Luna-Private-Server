<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna System - Ativação Clássica 2018</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background-color: #060608; color: #f4f4f5;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .panel {
            background: rgba(18, 18, 24, 0.9); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 16px; border: 1px solid rgba(255, 204, 0, 0.25);
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7);
        }
        h1 { color: #ffcc00; font-size: 2.2rem; margin-bottom: 6px; letter-spacing: 2px; text-transform: uppercase; }
        p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 28px; }
        .input-box { text-align: left; margin-bottom: 20px; }
        label { display: block; color: #e4e4e7; font-size: 0.75rem; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 15px; background: #0c0c0e; border: 2px solid #27272a;
            border-radius: 10px; color: #fff; font-size: 1rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #ffcc00; }
        .btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; text-transform: uppercase; margin-top: 12px; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .alert { padding: 14px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 0.85rem; text-align: left; font-weight: 600; }
        .success { background: rgba(16, 185, 129, 0.12); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .error { background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <div class="panel">
        <h1>LUNA SYSTEM</h1>
        <p>Criar conta retro (2018) com Passes e Skins ativados</p>

        <div class="alert success" id="successBox">✓ Conta sincronizada! Catálogo 2018 injetado no Firebase.</div>
        <div class="alert error" id="errorBox"></div>

        <form onsubmit="registrarAcessoRetro(event)">
            <div class="input-box">
                <label>Usuário do Jogo</label>
                <input type="text" id="userInput" required autocomplete="off">
            </div>
            <div class="input-box">
                <label>Senha do Painel</label>
                <input type="password" id="passInput" required>
            </div>
            <button type="submit" class="btn">Ativar Acesso 2018</button>
        </form>
    </div>

    <script>
        async function registrarAcessoRetro(e) {
            e.preventDefault();
            const username = document.getElementById('userInput').value;
            const password = document.getElementById('passInput').value;
            const successBox = document.getElementById('successBox');
            const errorBox = document.getElementById('errorBox');

            successBox.style.display = 'none';
            errorBox.style.display = 'none';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const resData = await response.json();

                if (response.ok) {
                    successBox.style.display = 'block';
                    document.querySelector('form').reset();
                } else {
                    errorBox.innerText = "Erro no Registro: " + (resData.error || "Tente novamente.");
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = "Erro Crítico: Falha na comunicação com o servidor Vercel.";
                errorBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
