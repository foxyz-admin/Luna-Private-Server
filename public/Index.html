<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna System - Painel Retro 2018</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #050507; color: #f4f4f5;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .box {
            background: #111115;
            padding: 40px; border-radius: 16px; border: 1px solid #ffcc00;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ffcc00; font-size: 2rem; margin-bottom: 8px; letter-spacing: 1px; }
        p { color: #a1a1aa; font-size: 0.85rem; margin-bottom: 24px; }
        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: #fff; font-size: 0.8rem; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        input {
            width: 100%; padding: 14px; background: #000; border: 1px solid #27272a;
            border-radius: 8px; color: #fff; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #ffcc00; }
        button {
            width: 100%; padding: 14px; background: #ffcc00; color: #000;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 0.85rem; }
        .ok { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981; }
        .err { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="box">
        <h1>LUNA SYSTEM</h1>
        <p>Injetar conta com todas as skins e passes de 2018</p>

        <div class="alert ok" id="ok">✓ Ativado com sucesso no Firebase!</div>
        <div class="alert err" id="err"></div>

        <form onsubmit="enviar(event)">
            <div class="group">
                <label>Utilizador</label>
                <input type="text" id="u" required autocomplete="off">
            </div>
            <div class="group">
                <label>Palavra-passe</label>
                <input type="password" id="p" required>
            </div>
            <button type="submit">Criar Conta 2018</button>
        </form>
    </div>

    <script>
        async function enviar(e) {
            e.preventDefault();
            const username = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            const ok = document.getElementById('ok');
            const err = document.getElementById('err');

            ok.style.display = 'none';
            err.style.display = 'none';

            try {
                const r = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const res = await r.json();

                if (r.ok) {
                    ok.style.display = 'block';
                    document.querySelector('form').reset();
                } else {
                    err.innerText = "Erro: " + (res.error || "Tente novamente.");
                    err.style.display = 'block';
                }
            } catch (x) {
                err.innerText = "Erro crítico de ligação com a Vercel.";
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
